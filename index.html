  <h1>みちあかり</h1>

  <p>
    みちあかりは、歩いた場所や移動した場所を少しずつ地図に記録していく探索アプリです。
  </p>

  <p>
    現実の移動に合わせて地図上の未探索エリアが解放され、自分だけの探索記録を作ることができます。
  </p>

  <h2>主な機能</h2>
  <ul>
    <li>位置情報を使った地図の解放</li>
    <li>歩いた場所・通った場所の記録</li>
    <li>現在地表示</li>
    <li>探索ブースト</li>
    <li>現在地アイコンの変更</li>
  </ul>
